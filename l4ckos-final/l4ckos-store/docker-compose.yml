services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - .env.backend
    init: true
    restart: unless-stopped
    ports:
      - "3010:3010"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3010/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - backend_uploads:/app/uploads
      - backend_backups:/app/backups
    networks:
      - loja-escoteira-network

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - loja-escoteira-network

networks:
  loja-escoteira-network:
    driver: bridge

volumes:
  backend_uploads:
  backend_backups:
